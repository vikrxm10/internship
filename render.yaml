services:
  # 1. Backend Service (Express + Prisma)
  - type: web
    name: food-waste-management-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run prisma:generate
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production

  # 2. Frontend Service (React + Vite Static Site)
  - type: web
    name: food-waste-management-client
    runtime: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # Rewrite all routes to index.html for React Router SPA routing
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Required for Vite build-time environment variable injection
      - key: VITE_API_URL
        sync: false
